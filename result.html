<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parsed — Results</title>
  <meta name="description" content="Parsed CV results — experience, education, skills and contact details." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo">Parsed</a>
  </header>

  <!-- Action Bar -->
  <div class="action-bar">
    <div class="action-bar-left">
      <span class="file-badge" id="file-badge">
        <!-- populated by ui.js -->
      </span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-secondary" onclick="window.print()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect width="12" height="8" x="6" y="14"/>
        </svg>
        Print
      </button>
      <a href="index.html" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload another
      </a>
    </div>
  </div>

  <!-- Main Content -->
  <main id="result-main" class="result-main">

    <!-- Left Column -->
    <div class="result-body">

      <!-- Identity Card -->
      <div class="identity-card">
        <div class="identity-name" id="cv-name">—</div>
        <div id="cv-contact"></div>
      </div>

      <!-- Summary -->
      <div class="cv-section" id="section-summary">
        <div class="section-header">
          <div class="section-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
            </svg>
          </div>
          <h2 class="section-title">Summary</h2>
        </div>
        <div class="section-body"></div>
      </div>

      <!-- Experience -->
      <div class="cv-section" id="section-experience">
        <div class="section-header">
          <div class="section-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="14" x="2" y="7" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
          <h2 class="section-title">Experience</h2>
        </div>
        <div class="section-body"></div>
      </div>

      <!-- Education -->
      <div class="cv-section" id="section-education">
        <div class="section-header">
          <div class="section-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
          </div>
          <h2 class="section-title">Education</h2>
        </div>
        <div class="section-body"></div>
      </div>

      <!-- Skills -->
      <div class="cv-section" id="section-skills">
        <div class="section-header">
          <div class="section-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
            </svg>
          </div>
          <h2 class="section-title">Skills</h2>
        </div>
        <div class="section-body"></div>
      </div>

    </div><!-- /result-body -->

    <!-- Right Sidebar -->
    <aside class="sidebar">
      <div id="sidebar-projects"></div>
      <div id="sidebar-certs"></div>
      <div id="sidebar-languages"></div>
    </aside>

  </main><!-- /result-main -->

  <footer class="site-footer">
    <span>Parsed</span>
    <span>No data leaves your browser.</span>
  </footer>

  <script src="js/extractor.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
